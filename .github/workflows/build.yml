name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'App.js'
      - 'android/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'App.js'
      - 'android/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    name: 构建Android APK
    runs-on: ubuntu-latest

    steps:
      # 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 设置 Java 环境
      - name: 设置 JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'gradle'

      # 设置 Node.js 环境
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 安装依赖
      - name: 安装依赖
        run: |
          cd android
          npm install

      # 给 gradlew 添加执行权限
      - name: 配置 Gradle
        run: |
          cd android
          chmod +x gradlew

      # 构建 Debug APK
      - name: 构建 Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      # 构建 Release APK（可选，需要签名）
      - name: 构建 Release APK（无签名）
        run: |
          cd android
          ./gradlew assembleRelease --stacktrace || true

      # 上传 Debug APK
      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # 上传 Release APK
      - name: 上传 Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # 创建构建摘要
      - name: 构建摘要
        run: |
          echo "## 📱 构建结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Debug APK 已构建" >> $GITHUB_STEP_SUMMARY
          echo "✅ Release APK 已构建" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 下载方式" >> $GITHUB_STEP_SUMMARY
          echo "1. 查看下方的 Artifacts 区域" >> $GITHUB_STEP_SUMMARY
          echo "2. 点击对应文件下载" >> $GITHUB_STEP_SUMMARY
